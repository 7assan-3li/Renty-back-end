<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renty Admin - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #008b96;
            --primary-dark: #006064;
            --dark-bg: #1a1a1a;
            --text-color: #333;
            --light-gray: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: #eef2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* حاوية تسجيل الدخول */
        .login-container {
            background: #fff;
            width: 1000px;
            max-width: 90%;
            height: 600px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 139, 150, 0.15);
            display: flex;
            overflow: hidden;
            animation: slideUp 0.8s ease-out;
            position: relative;
        }

        /* الجانب الأيمن (الفني) */
        .info-side {
            flex: 1;
            background: linear-gradient(135deg, var(--dark-bg), var(--primary-dark));
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 10; /* تأكدنا أن الخلفية الداكنة تغطي حركة السيارة */
        }

        .info-side::before {
            content: ''; position: absolute; top: -50px; left: -50px;
            width: 300px; height: 300px; background: var(--primary-color);
            opacity: 0.1; border-radius: 50%; z-index: -1;
        }

        .info-side::after {
            content: ''; position: absolute; bottom: -50px; right: -50px;
            width: 200px; height: 200px; background: var(--primary-color);
            opacity: 0.1; border-radius: 50%; z-index: -1;
        }

        .brand-logo {
            font-size: 50px; margin-bottom: 20px; color: var(--primary-color);
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            position: relative;
            display: inline-block;
            z-index: 20;
        }

        /* توجيه السيارة حسب اللغة */
        html[dir="rtl"] .brand-logo i { transform: scaleX(1); } /* وجهها يمين */
        html[dir="ltr"] .brand-logo i { transform: scaleX(-1); } /* وجهها يسار */

        /* --- Animations --- */
        
        /* كلاس الحركة للعربية */
        html[dir="rtl"] .car-drive-action {
            animation: driveRight 3.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        /* كلاس الحركة للإنجليزية */
        html[dir="ltr"] .car-drive-action {
            animation: driveLeft 3.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        /* حركة الخروج لليمين (عربي) */
        @keyframes driveRight {
            0% { transform: translateX(0) scaleX(1); opacity: 1; }
            20% { transform: translateX(-40px) scaleX(1) scale(0.95); opacity: 1; } /* رجوع للخلف */
            30% { transform: translateX(0) scaleX(1) scale(1); opacity: 1; } /* استعداد */
            60% { opacity: 1; } /* تظل واضحة */
            100% { transform: translateX(800px) scaleX(1) scale(1.1); opacity: 0; } /* انطلاق لليمين والاختفاء */
        }

        /* حركة الخروج لليسار (انجليزي) */
        @keyframes driveLeft {
            0% { transform: translateX(0) scaleX(-1); opacity: 1; }
            20% { transform: translateX(40px) scaleX(-1) scale(0.95); opacity: 1; } /* رجوع للخلف (جهة اليمين) */
            30% { transform: translateX(0) scaleX(-1) scale(1); opacity: 1; } /* استعداد */
            60% { opacity: 1; } /* تظل واضحة */
            100% { transform: translateX(-800px) scaleX(-1) scale(1.1); opacity: 0; } /* انطلاق لليسار والاختفاء */
        }

        .info-text h2 { font-size: 32px; margin-bottom: 10px; font-weight: 800; }
        .info-text p { font-size: 16px; opacity: 0.8; line-height: 1.6; max-width: 300px; margin: 0 auto; }

        /* الجانب الأيسر (الفورم) */
        .form-side {
            flex: 1; background: #fff; padding: 50px;
            display: flex; flex-direction: column; justify-content: center; position: relative;
            z-index: 5;
        }

        /* زر اللغة */
        .lang-btn {
            position: absolute; top: 20px; 
            background: #f0f0f0; color: #333; font-weight: bold;
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            font-size: 14px; transition: 0.3s;
        }
        html[dir="rtl"] .lang-btn { left: 20px; }
        html[dir="ltr"] .lang-btn { right: 20px; }
        
        .lang-btn:hover { background: #e0e0e0; }

        .form-header { margin-bottom: 40px; text-align: center; }
        .form-header h3 { font-size: 28px; color: var(--text-color); margin-bottom: 10px; }
        .form-header p { color: #888; font-size: 14px; }

        .input-group { position: relative; margin-bottom: 25px; }
        
        .form-control {
            width: 100%; border: 2px solid #eee; border-radius: 12px;
            font-size: 15px; outline: none; transition: 0.3s; background: #f9f9f9;
        }

        html[dir="rtl"] .form-control { padding: 15px 50px 15px 15px; }
        html[dir="ltr"] .form-control { padding: 15px 15px 15px 50px; }

        .input-group i.input-icon {
            position: absolute; top: 50%; transform: translateY(-50%);
            color: #aaa; transition: 0.3s;
        }
        html[dir="rtl"] .input-group i.input-icon { right: 15px; }
        html[dir="ltr"] .input-group i.input-icon { left: 15px; }

        .form-control:focus { border-color: var(--primary-color); background: #fff; box-shadow: 0 0 0 4px rgba(0, 139, 150, 0.1); }
        .form-control:focus + i.input-icon { color: var(--primary-color); }

        .toggle-password {
            position: absolute; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #ccc;
        }
        html[dir="rtl"] .toggle-password { left: 15px; }
        html[dir="ltr"] .toggle-password { right: 15px; }
        
        .toggle-password:hover { color: var(--text-color); }

        .form-options {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; font-size: 14px; color: #666;
        }

        .checkbox-container { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .checkbox-container input { accent-color: var(--primary-color); width: 16px; height: 16px; }
        
        .forgot-link { color: var(--primary-color); text-decoration: none; font-weight: 600; transition: 0.2s; }
        .forgot-link:hover { color: var(--primary-dark); text-decoration: underline; }

        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-dark));
            color: #fff; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 139, 150, 0.2);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 139, 150, 0.3); }
        
        html[dir="rtl"] .login-btn i { transform: rotate(0deg); }
        html[dir="ltr"] .login-btn i { transform: rotate(180deg); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .login-container { flex-direction: column; height: auto; }
            .info-side { padding: 30px; }
            .brand-logo { font-size: 40px; }
            .form-side { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="info-side">
            <div class="brand-logo"><i id="anim-car" class="fa-solid fa-car-side"></i></div>
            <div class="info-text">
                <h2>Renty Admin</h2>
                <p data-i18n="brandDesc">نظام إدارة أسطول السيارات الأكثر تطوراً وذكاءً. تحكم في كل التفاصيل من مكان واحد.</p>
            </div>
        </div>

        <div class="form-side">
            <div class="lang-btn" onclick="toggleLanguage()" id="langToggle">ENG</div>

            <div class="form-header">
                <h3 data-i18n="welcome">مرحباً بعودتك!</h3>
                <p data-i18n="enterDetails">الرجاء إدخال بياناتك للدخول إلى لوحة التحكم</p>
            </div>

            <form onsubmit="event.preventDefault(); login();">
                <div class="input-group">
                    <input type="email" class="form-control" id="emailInput" placeholder="البريد الإلكتروني" required>
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>

                <div class="input-group">
                    <input type="password" class="form-control" id="passwordInput" placeholder="كلمة المرور" required>
                    <i class="fa-solid fa-lock input-icon"></i>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox"> <span data-i18n="remember">تذكرني</span>
                    </label>
                    <!-- <a href="#" class="forgot-link" data-i18n="forgot">نسيت كلمة المرور؟</a> -->
                </div>

                <button type="submit" class="login-btn">
                    <span data-i18n="loginBtn">تسجيل الدخول</span> 
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </form>

            <div style="margin-top: 30px; text-align: center; font-size: 13px; color: #999;">
                &copy; 2026 Renty Car Rental System. <span data-i18n="copyright">جميع الحقوق محفوظة.</span>
            </div>
        </div>
    </div>

    <script>
        // قاموس الترجمة
        const translations = {
            ar: {
                brandDesc: "نظام إدارة أسطول السيارات الأكثر تطوراً وذكاءً. تحكم في كل التفاصيل من مكان واحد.",
                welcome: "مرحباً بعودتك!",
                enterDetails: "الرجاء إدخال بياناتك للدخول إلى لوحة التحكم",
                emailPlaceholder: "البريد الإلكتروني",
                passPlaceholder: "كلمة المرور",
                remember: "تذكرني",
                forgot: "نسيت كلمة المرور؟",
                loginBtn: "تسجيل الدخول",
                copyright: "جميع الحقوق محفوظة.",
                loggingIn: "جاري الدخول...",
                success: "تم تسجيل الدخول بنجاح! سيتم تحويلك."
            },
            en: {
                brandDesc: "The most advanced and smart fleet management system. Control every detail from one place.",
                welcome: "Welcome Back!",
                enterDetails: "Please enter your details to access the dashboard",
                emailPlaceholder: "Email Address",
                passPlaceholder: "Password",
                remember: "Remember me",
                forgot: "Forgot Password?",
                loginBtn: "Login",
                copyright: "All rights reserved.",
                loggingIn: "Logging in...",
                success: "Login Successful! Redirecting..."
            }
        };

        let currentLang = 'ar';

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            
            document.getElementById('langToggle').innerText = currentLang === 'ar' ? 'ENG' : 'ع';

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.innerText = translations[currentLang][key];
                }
            });

            document.getElementById('emailInput').placeholder = t('emailPlaceholder');
            document.getElementById('passwordInput').placeholder = t('passPlaceholder');
        }

        function togglePassword() {
            const passwordField = document.getElementById('passwordInput');
            const icon = document.querySelector('.toggle-password');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function login() {
            const btn = document.querySelector('.login-btn');
            const originalContent = btn.innerHTML;
            const carIcon = document.getElementById('anim-car');
            
            // تغيير نص الزر أثناء التحميل
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ${t('loggingIn')}`;
            btn.style.opacity = '0.8';
            btn.disabled = true;

            // تشغيل أنيميشن السيارة (المدة 3.2 ثانية)
            carIcon.classList.add('car-drive-action');
            
            // محاكاة عملية الدخول والانتظار حتى ينتهي الأنيميشن (3200 ميلي ثانية)
            setTimeout(() => {
                window.location.href = 'car.html'; 
            }, 2500); 
        }
    </script>

</body>
</html>
